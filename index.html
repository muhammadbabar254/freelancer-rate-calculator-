<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freelancer Rate Calculator</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <div class="card">

        <h1>💰 Freelancer Rate Calculator</h1>
        <p>Calculate your ideal freelance pricing</p>

        <div class="field">
            <label>Monthly Income Target ($)</label>
            <input type="number" id="income" placeholder="e.g. 2000">
        </div>

        <div class="field">
            <label>Working Days per Month</label>
            <input type="number" id="days" placeholder="e.g. 22">
        </div>

        <div class="field">
            <label>Working Hours per Day</label>
            <input type="number" id="hours" placeholder="e.g. 8">
        </div>

        <button id="calcBtn">Calculate Rate</button>

        <div class="result">

            <h2>Results</h2>

            <p>Hourly Rate: $<span id="hourly">0</span></p>
            <p>Daily Rate: $<span id="daily">0</span></p>
            <p>Monthly Rate: $<span id="monthly">0</span></p>

        </div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
